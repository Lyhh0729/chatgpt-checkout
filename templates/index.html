<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ChatGPT 订阅链接生成工具</title>
    <link rel="icon" href="https://chatgpt.com/favicon.ico" />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="shell topbar-inner">
        <div class="brand">
          <div class="brand-icon-wrapper">
            <svg class="brand-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M12 2L2 7l10 5 10-5-10-5z"/>
              <path d="M2 17l10 5 10-5"/>
              <path d="M2 12l10 5 10-5"/>
            </svg>
          </div>
          <div class="brand-copy">
            <strong>ChatGPT 订阅链接生成器</strong>
            <span>Flask 代理版 · 不存储 Token</span>
          </div>
        </div>
        <span class="privacy-note">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
          端到端加密 · Token 仅在内存中使用
        </span>
      </div>
    </header>

    <main class="shell page">
      <!-- Token 输入 -->
      <section class="panel token-panel">
        <div class="panel-title">
          <div>
            <h1>Access Token</h1>
            <p>粘贴 session JSON，或直接粘贴以 <code>eyJ</code> 开头的 Access Token</p>
          </div>
        </div>
        <textarea
          id="tokenInput"
          spellcheck="false"
          placeholder='{"user":{"email":"..."},"accessToken":"eyJ...","sessionToken":"..."}'
        ></textarea>
        <div id="tokenStatus" class="token-status muted">请在上方输入内容</div>
      </section>

      <!-- 功能 Tab -->
      <nav class="tabs" aria-label="功能切换">
        <button class="tab active" type="button" data-tab="checkout">订阅链接生成</button>
        <button class="tab" type="button" data-tab="source">订阅来源查询</button>
      </nav>

      <!-- 生成订阅链接 -->
      <section id="checkoutPanel" class="panel flow">
        <div class="panel-title">
          <div>
            <h2>订阅链接生成</h2>
            <p>选择套餐、区域和链接形式后生成支付链接</p>
          </div>
        </div>

        <fieldset class="choice-group">
          <legend>套餐类型</legend>
          <div class="choice-grid two">
            <button class="choice active" type="button" data-choice="plan" data-value="chatgptplusplan">
              <span class="choice-label">ChatGPT Plus</span>
              <small class="choice-desc">个人版 · 首月免费</small>
            </button>
            <button class="choice" type="button" data-choice="plan" data-value="chatgptteamplan">
              <span class="choice-label">ChatGPT Team</span>
              <small class="choice-desc">团队版 · 首月免费</small>
            </button>
          </div>
        </fieldset>

        <fieldset id="regionBlock" class="choice-group">
          <legend>计费区域</legend>
          <div class="choice-grid four">
            <button class="choice" type="button" data-choice="region" data-value="PH">
              <span class="choice-label">菲律宾</span>
              <small class="choice-desc">PHP · 菲律宾比索</small>
            </button>
            <button class="choice" type="button" data-choice="region" data-value="IN">
              <span class="choice-label">印度</span>
              <small class="choice-desc">INR · 印度卢比</small>
            </button>
            <button class="choice" type="button" data-choice="region" data-value="ID">
              <span class="choice-label">印尼</span>
              <small class="choice-desc">IDR · 印尼盾</small>
            </button>
            <button class="choice active" type="button" data-choice="region" data-value="US">
              <span class="choice-label">美国</span>
              <small class="choice-desc">USD · 美元</small>
            </button>
          </div>
        </fieldset>

        <label id="promoBlock" class="toggle-row">
          <input id="promoEnabled" type="checkbox" checked />
          <span class="toggle-ui" aria-hidden="true"></span>
          <span>
            <strong>启用优惠码</strong>
            <small>plus-1-month-free</small>
          </span>
        </label>

        <fieldset class="choice-group">
          <legend>链接形式</legend>
          <div class="choice-grid two">
            <button class="choice active" type="button" data-choice="uiMode" data-value="custom">
              <span class="choice-label">短链接</span>
              <small class="choice-desc">chatgpt.com/checkout/... 格式，方便分享</small>
            </button>
            <button class="choice" type="button" data-choice="uiMode" data-value="hosted">
              <span class="choice-label">长链接</span>
              <small class="choice-desc">Stripe 托管支付页面</small>
            </button>
          </div>
        </fieldset>

        <div id="teamBlock" class="team-grid hidden">
          <label>
            <span>Workspace 名称</span>
            <input id="workspaceName" type="text" value="MyTeam" autocomplete="off" />
          </label>
          <label>
            <span>席位数量</span>
            <input id="seatQuantity" type="number" min="2" value="5" />
          </label>
        </div>

        <button id="generateButton" class="primary-action" type="button">生成订阅链接</button>
        <div id="checkoutOutput" class="output hidden"></div>
      </section>

      <!-- 订阅来源查询 -->
      <section id="sourcePanel" class="panel flow hidden">
        <div class="panel-title">
          <div>
            <h2>订阅来源查询</h2>
            <p>查询当前账号的订阅来源、套餐类型、到期时间和支付处理器</p>
          </div>
        </div>
        <button id="sourceButton" class="primary-action alt" type="button">查询订阅来源</button>
        <div id="sourceOutput" class="output hidden"></div>
      </section>
    </main>

    <footer class="shell footer">
      <p>本工具仅作为 OpenAI 内部 API 的代理转发层，<strong>不会保存任何 Token 或个人信息</strong>。</p>
      <p>所有请求通过 HTTPS 加密传输，后端仅在内存中处理。</p>
    </footer>

    <script src="/static/app.js" defer></script>
  </body>
</html>
